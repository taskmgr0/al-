<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔮 技能扭蛋机</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(145deg, #1e2b3a 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 48px;
      padding: 28px 24px 32px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.08);
    }

    h1 {
      text-align: center;
      font-weight: 500;
      letter-spacing: 2px;
      font-size: 2.2rem;
      color: #f0e9e1;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      margin-bottom: 12px;
    }

    .wheel-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      margin: 10px 0 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-radius: 50%;
      /* 给整个轮盘外围加一圈厚重的深色外壳阴影 */
      box-shadow: 0 0 0 10px #1a2533, 0 20px 40px rgba(0,0,0,0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0f172a;
      cursor: pointer;
    }

    /* 优化后的 3D 质感指针 */
    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 45px solid #f39c12;
      filter: drop-shadow(0 6px 6px rgba(0, 0, 0, 0.6));
      z-index: 10;
      pointer-events: none;
    }
    .pointer::before {
      content: "";
      position: absolute;
      top: -45px;
      left: -20px;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 45px solid rgba(255, 255, 255, 0.25);
    }
    .pointer::after {
      content: "";
      position: absolute;
      top: -55px;
      left: -12px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at 30% 30%, #ffeaa7 0%, #d4a72c 70%, #9e7b1a 100%);
      border-radius: 50%;
      box-shadow: 0 0 0 3px #1a2533, inset 0 2px 4px rgba(255,255,255,0.6);
    }

    /* 半透明磨砂遮罩，让背后的轮盘旋转若隐若现 */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.65); /* 降低透明度 */
      backdrop-filter: blur(4px); /* 增加毛玻璃效果 */
      -webkit-backdrop-filter: blur(4px);
      border-radius: 50%;
      z-index: 20;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.active {
      display: flex;
    }

    .loading-scene {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 给加载场景加上一点发光，使其在暗背景下突出 */
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
    }

    .cat-container {
      position: relative;
      width: 75%;
      max-width: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cat-svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    @keyframes catBounce {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-10px) scaleY(1.02); }
    }
    @keyframes tailWag {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(18deg); }
    }
    @keyframes eyeBlink {
      0%, 42%, 58%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: 0.6; }
      50% { transform: scaleX(0.78); opacity: 0.3; }
    }
    @keyframes meowFloat {
      0% { opacity: 0; transform: translate(0, 5px) scale(0.9); }
      15% { opacity: 1; transform: translate(3px, 0px) scale(1); }
      70% { opacity: 1; transform: translate(8px, -12px) scale(1); }
      100% { opacity: 0; transform: translate(12px, -18px) scale(0.95); }
    }

    .cat-group {
      animation: catBounce 2s infinite ease-in-out;
      transform-origin: center 155px;
    }
    .tail {
      animation: tailWag 2s infinite ease-in-out;
      transform-origin: 130px 148px;
    }
    .eye-blink {
      animation: eyeBlink 3.5s infinite;
      transform-origin: center;
    }
    .cat-shadow {
      animation: shadowPulse 2s infinite ease-in-out;
      transform-origin: 100px 175px;
    }
    .meow-text {
      position: absolute;
      top: 38%;
      right: 5%;
      font-size: 1.1rem;
      font-weight: bold;
      color: #e2e8f0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      animation: meowFloat 2.2s infinite ease-in-out;
      pointer-events: none;
      letter-spacing: 2px;
      z-index: 10;
    }

    .loading-text {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #e2e8f0;
      text-align: center;
      letter-spacing: 3px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* 抽卡结果遮罩层 */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .overlay.active {
      display: flex;
      opacity: 1;
    }

    .card-reveal {
      position: relative;
      width: min(380px, 85vw);
      padding: 60px 40px 50px;
      background: linear-gradient(135deg, #1a2a3a 0%, #0d1a2a 100%);
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 0 60px rgba(233, 177, 59, 0.3), 0 30px 60px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(233, 177, 59, 0.4);
      transform: scale(0.3) rotateY(180deg);
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .overlay.active .card-reveal {
      transform: scale(1) rotateY(0deg);
      opacity: 1;
    }

    .card-reveal::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(233, 177, 59, 0.1), transparent, rgba(233, 177, 59, 0.05), transparent);
      animation: rotateBg 3s linear infinite;
    }
    .card-reveal::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes rotateBg { 100% { transform: rotate(360deg); } }
    @keyframes shimmer { 0%, 100% { left: -100%; } 50% { left: 100%; } }

    .card-label {
      font-size: 1rem;
      color: #a7bbce;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .card-stars {
      font-size: 1.5rem;
      color: #f2c94c;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      text-shadow: 0 0 10px rgba(242, 201, 76, 0.5);
      animation: starPulse 1.5s ease-in-out infinite;
    }
    @keyframes starPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .card-result {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fad98b;
      text-shadow: 0 0 20px rgba(250, 217, 139, 0.4);
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease-out 0.4s;
    }
    .overlay.active .card-result {
      opacity: 1;
      transform: translateY(0);
    }

    .card-subtitle {
      font-size: 0.95rem;
      color: #b9cdde;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease-out 0.6s;
      line-height: 1.4;
    }
    .overlay.active .card-subtitle {
      opacity: 1;
      transform: translateY(0);
    }

    .card-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #a7bbce;
      font-size: 1.2rem;
      border-radius: 50%;
      cursor: pointer;
      z-index: 2;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-close:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }

    /* 粒子效果容器 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #f2c94c;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(242, 201, 76, 0.8);
      animation: particleFall linear forwards;
    }
    @keyframes particleFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .control-panel {
      background: rgba(10, 20, 30, 0.5);
      border-radius: 36px;
      padding: 22px 18px 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 215, 150, 0.2);
      margin-top: 8px;
    }

    .label-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #e2dcd2;
    }
    .label-header label { font-weight: 500; font-size: 1rem; letter-spacing: 0.5px; }
    .badge {
      background: #2a3a4a;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #bdd3e6;
      border: 1px solid #5f7f9f;
    }

    textarea {
      width: 100%;
      padding: 16px 18px;
      font-size: 1rem;
      line-height: 1.5;
      background: #1e2a36;
      border: 1px solid #5e7c9c;
      border-radius: 28px;
      color: #f2e9de;
      resize: vertical;
      min-height: 110px;
      font-family: inherit;
      box-shadow: inset 0 4px 10px #00000040, 0 2px 4px rgba(0,0,0,0.2);
      transition: border 0.15s;
    }
    textarea:focus {
      outline: none;
      border-color: #f3b33d;
      box-shadow: inset 0 4px 10px #00000060, 0 0 0 3px rgba(243, 179, 61, 0.3);
    }
    textarea::placeholder { color: #9aabbb; font-size: 0.9rem; }

    .hint { font-size: 0.8rem; color: #a7bbce; margin: 8px 0 18px 8px; }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      background: #2e4057;
      border: none;
      border-bottom: 3px solid #0f1a24;
      color: #f2e7d5;
      padding: 12px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 6px 0 #0f1a24, 0 4px 10px black;
      transition: all 0.08s ease-in;
      flex: 1 1 140px;
      letter-spacing: 1px;
      backdrop-filter: blur(5px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover {
      background: #3f5a74;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #0f1a24, 0 6px 14px black;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0f1a24, 0 4px 10px black;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      transform: none;
      box-shadow: 0 4px 0 #0f1a24, 0 2px 6px black;
      background: #3a4a5e;
    }

    .spin-btn {
      background: linear-gradient(180deg, #f5b041 0%, #d48f2b 100%);
      border-bottom-color: #7a4f15;
      color: #0b0f16;
      text-shadow: 0 1px 2px #ffdd99;
      font-weight: 700;
      box-shadow: 0 6px 0 #7a4f15, 0 4px 12px rgba(0,0,0,0.6);
    }
    .spin-btn:hover { background: linear-gradient(180deg, #f8c471 0%, #e7a43e 100%); }

    .result-area {
      background: rgba(13, 26, 38, 0.8);
      border-radius: 40px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 6px solid #f3b33d;
      backdrop-filter: blur(4px);
      margin-top: 12px;
    }
    .result-label {
      color: #b9cdde;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }
    .result-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fad98b;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      max-width: 70%;
      text-align: right;
      word-break: break-word;
    }

    .footer-note {
      color: #7d95aa;
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔮 技能扭蛋机</h1>

  <div class="wheel-wrapper">
    <canvas id="wheelCanvas"></canvas>
    <div class="pointer"></div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-scene">
        <div class="cat-container">
          <div class="meow-text">喵~</div>
          <svg class="cat-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="cat-shadow" cx="100" cy="175" rx="42" ry="7" fill="#000" opacity="0.6" />
            <g class="cat-group">
              <path class="tail" d="M 130 148 C 158 120, 182 152, 148 162 C 138 165, 134 158, 130 148 Z" fill="#ffffff" stroke="#1a2533" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M 75 158 C 52 158, 48 130, 52 112 C 30 102, 34 64, 66 58 L 76 24 L 90 50 Q 100 44, 110 50 L 124 24 L 134 58 C 166 64, 170 102, 148 112 C 152 130, 148 158, 125 158 Q 100 163, 75 158 Z" fill="#ffffff" stroke="#1a2533" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round" />
              <path d="M 68 54 L 75 33 L 84 50 Z" fill="#ffb3b3" stroke="#1a2533" stroke-width="3.5" stroke-linejoin="round" />
              <path d="M 132 54 L 125 33 L 116 50 Z" fill="#ffb3b3" stroke="#1a2533" stroke-width="3.5" stroke-linejoin="round" />
              <ellipse cx="52" cy="100" rx="12" ry="8" fill="#ffb3b3" opacity="0.7" />
              <ellipse cx="148" cy="100" rx="12" ry="8" fill="#ffb3b3" opacity="0.7" />
              <g stroke="#1a2533" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
                <line x1="44" y1="98" x2="56" y2="101" />
                <line x1="42" y1="104" x2="54" y2="107" />
                <line x1="144" y1="101" x2="156" y2="98" />
                <line x1="146" y1="107" x2="158" y2="104" />
              </g>
              <ellipse class="eye-blink" cx="78" cy="96" rx="6.5" ry="11" fill="#1a2533" style="transform-origin:78px 96px;" />
              <ellipse class="eye-blink" cx="122" cy="96" rx="6.5" ry="11" fill="#1a2533" style="transform-origin:122px 96px;" />
              <path d="M 90 107 Q 95 116, 100 107 Q 105 116, 110 107" fill="none" stroke="#1a2533" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M 82 143 Q 91 162, 100 143 Q 109 162, 118 143" fill="none" stroke="#1a2533" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M 84 146 Q 91 160, 100 146 Q 109 160, 116 146" fill="#ffb3b3" opacity="0.25" />
            </g>
          </svg>
        </div>
        <div class="loading-text">正在为您抽取...</div>
      </div>
    </div>
  </div>

  <div class="control-panel">
    <div class="label-header">
      <label>✏️ 编辑扭蛋奖池 (每行一个，或用逗号分隔)</label>
      <span class="badge" id="itemCountBadge">3 项</span>
    </div>
    <textarea id="optionsInput" placeholder="例如:&#10;语文, 数学, 英语&#10;物理&#10;化学">数学真题专题, 专业课一套, 英语单词默写一套</textarea>
    <div class="hint">💡 支持中英文逗号、换行，自动去空</div>

    <div class="action-row">
      <button class="btn" id="updateBtn" title="根据输入更新轮盘">🔄 更新轮盘</button>
      <button class="btn spin-btn" id="spinBtn">🎴 开始扭蛋</button>
    </div>

    <div class="result-area">
      <span class="result-label">上次抽到</span>
      <span class="result-value" id="resultDisplay">—</span>
    </div>
  </div>
  <div class="footer-note">✨ 点击扭蛋，随机获取今日专属加成</div>
</div>

<!-- 抽卡结果遮罩 -->
<div class="overlay" id="overlay">
  <div class="card-reveal" id="cardReveal">
    <button class="card-close" id="cardClose">✕</button>
    <div class="card-label">🎁 今日专属掉落</div>
    <div class="card-stars">⭐⭐⭐⭐⭐</div>
    <div class="card-result" id="cardResult"></div>
    <div class="card-subtitle" id="cardSubtitle">加油！你是最棒的！💪</div>
  </div>
</div>

<!-- 粒子容器 -->
<div class="particles" id="particles"></div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const optionsInput = document.getElementById('optionsInput');
    const updateBtn = document.getElementById('updateBtn');
    const spinBtn = document.getElementById('spinBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const itemCountBadge = document.getElementById('itemCountBadge');
    const overlay = document.getElementById('overlay');
    const cardResult = document.getElementById('cardResult');
    const cardSubtitle = document.getElementById('cardSubtitle');
    const cardClose = document.getElementById('cardClose');
    const particlesContainer = document.getElementById('particles');
    const loadingOverlay = document.getElementById('loadingOverlay');

    const encouragementQuotes = [
      "再坚持一下，你可以的。", "今天的努力，是明天的底气。", "慢慢来，比较快。",
      "专注当下，不问结果。", "你已经很棒了，继续向前。", "休息一下，是为了更好地出发。",
      "每一个小进步，都值得开心。", "相信自己，你比想象中更强大。", "学一点，就多懂一点。",
      "不怕慢，就怕站。", "积跬步，至千里。", "静下心，沉住气。",
      "难题怕“认真”二字。", "完成比完美更重要。", "先做五分钟，再说。",
      "你的潜力，藏在每天的坚持里。", "累了就歇歇，但别放弃。", "一步一个脚印，路会越来越宽。",
      "别急，最好的总在不经意间出现。", "你只管努力，剩下的交给时间。", "今天也是闪闪发光的一天。",
      "深呼吸，然后继续。", "没有白走的路，每一步都算数。"
    ];

    // 高级电竞/游戏风渐变色板
    const premiumPalettes = [
      ['#FF512F', '#DD2476'], // 绯红
      ['#4776E6', '#8E54E9'], // 幻紫
      ['#00B4DB', '#0083B0'], // 幽蓝
      ['#F09819', '#EDDE5D'], // 灿金
      ['#11998e', '#38ef7d'], // 翠绿
      ['#DA4453', '#89216B'], // 暗玫
      ['#8E2DE2', '#4A00E0'], // 深靛
      ['#FF416C', '#FF4B2B'], // 炽橘
    ];

    let labels = [];
    let colors = [];
    let rotation = 0.0;
    let isAnimating = false;
    
    // 动画控制变量
    let spinStartTime = null;
    let startRotation = 0;
    let targetRotation = 0;
    const SPIN_DURATION = 2500; // 旋转总时长(毫秒)

    const PI = Math.PI;
    const TAU = 2 * PI;

    function parseLabelsFromInput(inputText) {
      const normalized = inputText.replace(/[，、\s]+/g, ',');
      let parts = normalized.split(',').map(s => s.trim()).filter(s => s !== '');
      if (parts.length === 0) parts = ['语文', '数学'];
      if (parts.length < 2) parts.push('自习');
      return parts;
    }

    function generateColors(count) {
      const newColors = [];
      for (let i = 0; i < count; i++) {
        newColors.push(premiumPalettes[i % premiumPalettes.length]);
      }
      return newColors;
    }

    function updateWheelFromInput() {
      if (isAnimating) return;
      loadingOverlay.classList.remove('active');
      canvas.style.pointerEvents = '';

      const rawText = optionsInput.value;
      labels = parseLabelsFromInput(rawText);
      colors = generateColors(labels.length);
      rotation = 0.0;

      itemCountBadge.textContent = `${labels.length} 项`;
      drawWheel();
      resultDisplay.textContent = '—';
    }

    function drawWheel() {
      const count = labels.length;
      if (count === 0) return;

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const realW = Math.round(rect.width * dpr);
      const realH = Math.round(rect.height * dpr);
      if (canvas.width !== realW || canvas.height !== realH) {
        canvas.width = realW;
        canvas.height = realH;
      }

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = rect.width;
      const h = rect.height;
      const centerX = w / 2;
      const centerY = h / 2;
      // 缩小一点半径，留出空间画华丽的外边框
      const radius = Math.min(w, h) * 0.42; 

      ctx.clearRect(0, 0, w, h);
      const angleStep = TAU / count;

      // 1. 绘制扇区背景 (带渐变和阴影)
      for (let i = 0; i < count; i++) {
        const start = rotation + i * angleStep;
        const end = start + angleStep;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, start, end);
        ctx.closePath();
        
        // 使用径向渐变营造 3D 凹陷质感
        const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
        grad.addColorStop(0.2, colors[i][0]);
        grad.addColorStop(1, colors[i][1]);
        ctx.fillStyle = grad;
        ctx.fill();

        // 扇区之间的华丽分割线
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(start) * radius, centerY + Math.sin(start) * radius);
        ctx.stroke();
      }

      // 2. 绘制整个轮盘的内发光阴影层，增加深度
      const innerShadow = ctx.createRadialGradient(centerX, centerY, radius - 25, centerX, centerY, radius);
      innerShadow.addColorStop(0, 'rgba(0,0,0,0)');
      innerShadow.addColorStop(1, 'rgba(0,0,0,0.5)');
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, TAU);
      ctx.fillStyle = innerShadow;
      ctx.fill();

      // 3. 绘制清晰的文字，防止超出轮盘
      for (let i = 0; i < count; i++) {
        const start = rotation + i * angleStep;
        const midAngle = start + angleStep / 2;
        
        // 将锚点设在靠近边缘的位置 (0.82倍半径)
        const textRadius = radius * 0.82;
        const x = centerX + Math.cos(midAngle) * textRadius;
        const y = centerY + Math.sin(midAngle) * textRadius;

        ctx.save();
        ctx.translate(x, y);
        
        // 判断是否需要翻转文字以保证可读性
        const isFlipped = midAngle > PI / 2 && midAngle < 3 * PI / 2;
        if (isFlipped) {
          ctx.rotate(midAngle + PI);
          ctx.textAlign = 'left'; // 翻转后排版方向向中心延伸
        } else {
          ctx.rotate(midAngle);
          ctx.textAlign = 'right'; // 正常时排版方向向中心延伸
        }
        
        ctx.textBaseline = 'middle';

        let fontSize = Math.min(26, Math.max(16, Math.floor(radius * 0.16)));
        const text = labels[i];
        if (text.length > 6) fontSize = Math.max(14, fontSize - 2);
        if (text.length > 10) fontSize = Math.max(12, fontSize - 4);

        ctx.font = `bold ${fontSize}px 'STXingkai', 'STKaiti', 'KaiTi', '楷体', cursive, serif`;
        
        // 黑色文字，带有微弱的浅色光晕以适应渐变底色
        ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 1;
        
        ctx.fillStyle = '#111827'; // 质感深黑色文字
        
        // 设置最大宽度限制，防止文字越过中心点或者超出轮盘
        const maxTextWidth = radius * 0.65;
        ctx.fillText(text, 0, 0, maxTextWidth);
        
        ctx.restore();
      }

      // 4. 绘制华丽的金属质感外轮廓
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, TAU);
      ctx.lineWidth = 12;
      const rimGrad = ctx.createLinearGradient(0, 0, w, h);
      rimGrad.addColorStop(0, '#f1c40f');
      rimGrad.addColorStop(0.5, '#e67e22');
      rimGrad.addColorStop(1, '#f39c12');
      ctx.strokeStyle = rimGrad;
      ctx.stroke();
      
      // 外轮廓高光线
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius - 5, 0, TAU);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.stroke();

      // 5. 绘制中心枢纽宝石
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.14, 0, TAU);
      ctx.fillStyle = '#1a2533';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 15;
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.14, 0, TAU);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = rimGrad;
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.06, 0, TAU);
      ctx.fillStyle = '#f1c40f';
      ctx.fill();
    }

    // 缓动函数 (Ease Out Quart)，实现平滑减速
    function easeOutQuart(t) {
      return 1 - (--t) * t * t * t;
    }

    function animateSpin(timestamp) {
      if (!spinStartTime) spinStartTime = timestamp;
      const elapsed = timestamp - spinStartTime;
      let progress = elapsed / SPIN_DURATION;

      if (progress > 1) progress = 1;

      const easeProgress = easeOutQuart(progress);
      rotation = startRotation + (targetRotation - startRotation) * easeProgress;

      drawWheel();

      if (progress < 1) {
        requestAnimationFrame(animateSpin);
      } else {
        // 旋转动画彻底结束后，显示结果弹窗
        isAnimating = false;
        spinBtn.disabled = false;
        updateBtn.disabled = false;
        loadingOverlay.classList.remove('active');
        canvas.style.pointerEvents = '';
        
        // 算出真正中奖的 Label (基于目标角度计算)
        const count = labels.length;
        const angleStep = TAU / count;
        // 顶部的角度是 -PI/2 (即 270 度)
        let finalMod = (( -PI / 2 - rotation ) % TAU + TAU) % TAU; 
        let winnerIndex = Math.floor(finalMod / angleStep);
        
        const winner = labels[winnerIndex];
        resultDisplay.textContent = winner;
        showCardAnimation(winner);
      }
    }

    function createParticles() {
      particlesContainer.innerHTML = '';
      const cols = ['#f2c94c', '#e9b13b', '#fad98b', '#ffecb3', '#d4a72c', '#fff', '#ffe066'];
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (Math.random() * 8 + 3) + 'px';
        p.style.height = p.style.width;
        p.style.background = cols[Math.floor(Math.random() * cols.length)];
        p.style.boxShadow = `0 0 6px ${p.style.background}`;
        p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        p.style.animationDelay = Math.random() * 0.5 + 's';
        particlesContainer.appendChild(p);
      }
    }

    function clearParticles() {
      setTimeout(() => { particlesContainer.innerHTML = ''; }, 3000);
    }

    function showCardAnimation(winnerText) {
      cardResult.textContent = winnerText;
      const randomQuote = encouragementQuotes[Math.floor(Math.random() * encouragementQuotes.length)];
      cardSubtitle.textContent = randomQuote;
      overlay.classList.add('active');
      createParticles();
    }

    function hideCardAnimation() {
      overlay.classList.remove('active');
      clearParticles();
    }

    function startDraw() {
      if (isAnimating) return;
      const count = labels.length;
      if (count < 2) { alert('至少需要两个选项才能抽取'); return; }

      isAnimating = true;
      spinBtn.disabled = true;
      updateBtn.disabled = true;
      canvas.style.pointerEvents = 'none';

      // 1. 确定中奖索引
      const targetIndex = Math.floor(Math.random() * count);
      
      // 2. 计算物理旋转的目标角度
      const angleStep = TAU / count;
      // 指针在正上方(-PI/2)，要求旋转停止时，指针正好落在 targetIndex 的扇形正中间
      const targetCenterAngle = targetIndex * angleStep + angleStep / 2;
      // 需要的最终旋转角度 (加上基础旋转圈数，比如多转 6 圈)
      const extraSpins = 6 * TAU;
      
      // 计算所需的准确终点
      const currentMod = rotation % TAU;
      let finalNeededRotation = -PI / 2 - targetCenterAngle;
      
      targetRotation = rotation - currentMod + extraSpins + finalNeededRotation;
      
      // 确保总是向前转动
      if (targetRotation <= rotation + (4 * TAU)) {
          targetRotation += TAU;
      }

      startRotation = rotation;
      spinStartTime = null;

      // 3. 开启猫咪遮罩并开始物理旋转
      loadingOverlay.classList.add('active');
      requestAnimationFrame(animateSpin);
    }

    function initialSetup() {
      const defaultText = optionsInput.value;
      labels = parseLabelsFromInput(defaultText);
      colors = generateColors(labels.length);
      rotation = 0.0;
      itemCountBadge.textContent = `${labels.length} 项`;
      drawWheel();
      resultDisplay.textContent = '—';

      updateBtn.addEventListener('click', updateWheelFromInput);

      spinBtn.addEventListener('click', () => {
        if (labels.length < 2) { alert('请至少设置两个选项'); return; }
        startDraw();
      });

      canvas.addEventListener('click', () => {
        if (isAnimating) return;
        if (labels.length >= 2) { startDraw(); }
        else { alert('选项不足，请添加'); }
      });

      cardClose.addEventListener('click', hideCardAnimation);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) hideCardAnimation();
      });

      optionsInput.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          updateWheelFromInput();
        }
      });
    }

    initialSetup();
    window.addEventListener('resize', () => { if (!isAnimating) drawWheel(); });
  })();
</script>
</body>
</html>
